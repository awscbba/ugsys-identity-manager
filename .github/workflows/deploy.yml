name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".gitignore"
      - ".kiro/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ugsys-identity-manager
  LAMBDA_FUNCTION: ugsys-identity-manager-prod

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy Lambda (container image)
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: push
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f Dockerfile.lambda -t "$IMAGE_URI" -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$IMAGE_URI"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Update Lambda function image
        run: |
          aws lambda update-function-code \
            --function-name "${{ env.LAMBDA_FUNCTION }}" \
            --image-uri "${{ steps.push.outputs.image_uri }}" \
            --region "${{ env.AWS_REGION }}"

          aws lambda wait function-updated \
            --function-name "${{ env.LAMBDA_FUNCTION }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C0AE6QV0URH",
              "username": "ugsys CI/CD",
              "icon_emoji": ":rocket:",
              "text": "🚀 Deployed — ugsys-identity-manager",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "🚀 Deployed — ugsys-identity-manager (prod)", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"}
                  ]
                }
              ]
            }

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C0AE6QV0URH",
              "username": "ugsys CI/CD",
              "icon_emoji": ":x:",
              "text": "❌ Deploy Failed — ugsys-identity-manager",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "❌ Deploy Failed — ugsys-identity-manager", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {"type": "button", "text": {"type": "plain_text", "text": "View Run"},
                     "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
                  ]
                }
              ]
            }
