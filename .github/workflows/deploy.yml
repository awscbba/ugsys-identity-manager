name: Deploy

on:
  push:
    branches: [main]
    paths-ignore: ["*.md", ".gitignore"]

env:
  PYTHON_VERSION: "3.13"
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Lambda (prod)
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync

      - name: Build Lambda package
        run: |
          # Always start from a clean dist/ to prevent stale packages accumulating
          rm -rf dist/
          uv export --no-dev --no-hashes -o requirements.txt
          pip install \
            -r requirements.txt \
            -t dist/ \
            --quiet \
            --python-version 3.13 \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --abi cp313 \
            --only-binary :all:
          # Explicitly remove passlib — it is not a direct dependency but can
          # appear as a transitive artifact from older bcrypt wheels. Its
          # detect_wrap_bug() runs at import time and crashes with a ValueError
          # when passwords exceed 72 bytes, breaking all Lambda invocations.
          find dist/ -name "passlib*" -exec rm -rf {} + 2>/dev/null || true
          cp -r src dist/
          cp src/main.py dist/handler.py

      - name: Deploy via AWS CLI (Lambda update)
        run: |
          cd dist && zip -r ../function.zip . -q
          aws lambda update-function-code \
            --function-name ugsys-identity-manager-prod \
            --zip-file fileb://../function.zip \
            --region ${{ env.AWS_REGION }}

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C0AE6QV0URH",
              "username": "ugsys CI/CD",
              "icon_emoji": ":rocket:",
              "text": "🚀 Deployed — ugsys-identity-manager",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "🚀 Deployed — ugsys-identity-manager (prod)", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {"type": "button", "text": {"type": "plain_text", "text": "View Run"},
                     "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
                  ]
                }
              ]
            }

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C0AE6QV0URH",
              "username": "ugsys CI/CD",
              "icon_emoji": ":x:",
              "text": "❌ Deploy Failed — ugsys-identity-manager",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "❌ Deploy Failed — ugsys-identity-manager", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {"type": "button", "text": {"type": "plain_text", "text": "View Run"},
                     "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
                  ]
                }
              ]
            }
